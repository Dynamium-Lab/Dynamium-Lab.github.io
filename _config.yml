title: Dynamium
description: >-
  Dynamic Systems Lab — Université de Moncton. Robotics research
  laboratory specialized in robotic manipulators and physical
  human-robot interaction.
baseurl: "" # set this to your repo name if publishing at username.github.io/repo-name, else leave blank
url: "https://www.dynamium.ca" # matches CNAME; set this to https://your-username.github.io if not using a custom domain

default_lang: fr

# section order used on the homepage — edit here to reorder (labels are in _data/strings.yml)
members_sections:
  - professors
  - staff_grad
  - undergrad
  - alumni

markdown: kramdown
plugins:
  - jekyll-feed

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

exclude:
  - README.md
